<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMS EXOSUIT</title>

<style>

/* IMPORT FUTURISTIC FONT */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at 50% 20%, #0a0f1f, #000);
  color: #7df9ff;
  padding: 15px;
  overflow-x: hidden;
}

/* HUD GRID LINES */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(#00eaff11 1px, transparent 1px),
    linear-gradient(90deg, #00eaff11 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* HEADER */
h1 {
  font-size: 22px;
  letter-spacing: 2px;
  text-shadow: 0 0 12px #00eaff, 0 0 30px #00eaff55;
}

/* PANELS */
.card {
  background: rgba(0, 10, 25, 0.75);
  border: 1px solid #00eaff33;
  box-shadow:
    inset 0 0 20px #00eaff11,
    0 0 20px #00eaff22;
  backdrop-filter: blur(8px);
  padding: 15px;
  margin-top: 14px;
  border-radius: 14px;
  position: relative;
}

/* PANEL CORNER ACCENTS */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 1px solid #00eaff22;
  clip-path: polygon(
    0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px,
    100% calc(100% - 10px), calc(100% - 10px) 100%,
    10px 100%, 0 calc(100% - 10px)
  );
  pointer-events: none;
}

/* INPUTS */
input, select {
  background: transparent;
  border: 1px solid #00eaff55;
  color: #7df9ff;
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
}

/* BUTTONS */
button {
  background: transparent;
  border: 1px solid #00eaff;
  color: #00eaff;
  padding: 10px 14px;
  margin: 5px;
  border-radius: 6px;
  transition: all 0.2s ease;
}

button:hover {
  background: #00eaff;
  color: #000;
  box-shadow: 0 0 12px #00eaff;
}

/* LIST ITEMS */
li {
  padding: 6px 0;
  border-bottom: 1px solid #00eaff22;
}

/* SCANNING ANIMATION */
.scanline {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    transparent 0%,
    rgba(0,255,255,0.05) 50%,
    transparent 100%
  );
  animation: scan 6s linear infinite;
  pointer-events: none;
}

@keyframes scan {
  from { transform: translateY(-100%); }
  to { transform: translateY(100%); }
}

 
<body>

<h1>🚀 EXOSUIT TERMINAL</h1>

<div class="card">
<h3>Inventory</h3>
<input id="name" placeholder="Resource">
<input id="qty" type="number" placeholder="Qty">
<button onclick="add()">Add</button>
<ul id="list"></ul>
</div>

<div class="card">
<h3>Crafting Matrix</h3>
<select id="craftSelect"></select>
<input id="craftQty" type="number" placeholder="Amount">
<button onclick="plan()">Compute</button>
<div id="craftOut"></div>
</div>

<div class="card">
<h3>Trade Terminal</h3>
<input id="item" placeholder="Item">
<input id="buy" type="number" placeholder="Buy price">
<input id="sell" type="number" placeholder="Sell price">
<input id="amount" type="number" placeholder="Qty">
<button onclick="trade()">Calculate</button>
<div id="tradeOut"></div>
</div>

<div class="card">
<h3>Data Core</h3>
<button onclick="exportData()">Export</button>
<input type="file" onchange="importData(event)">
</div>

<script>

// ===== INVENTORY =====
let inv = JSON.parse(localStorage.getItem("nms_inv")) || [];

function save(){ localStorage.setItem("nms_inv", JSON.stringify(inv)); }

function render(){
list.innerHTML="";
inv.forEach((r,i)=>{
let li=document.createElement("li");
li.innerHTML=`${r.name} - ${r.qty}
<button onclick="del(${i})">❌</button>`;
list.appendChild(li);
});
}

// ===== ADD =====
function add(){
let n=name.value;
let q=parseInt(qty.value);
if(!n||!q) return;

let e=inv.find(x=>x.name===n);
if(e) e.qty+=q;
else inv.push({name:n, qty:q});

save(); render();
}

function del(i){ inv.splice(i,1); save(); render(); }

// ===== RECIPES =====
const recipes = {
"Warp Cell": {"Antimatter":1,"Antimatter Housing":1},
"Antimatter Housing":{"Oxygen":30,"Ferrite":50},
"Fusion Ignitor":{
  "Quantum Processor":1,
  "Superconductor":1
},
"Quantum Processor":{
  "Circuit Board":1,
  "Superconductor":1
},
"Circuit Board":{"Copper":100,"Chromatic Metal":200},
"Superconductor":{"Condensed Carbon":200}
};

// ===== CRAFT =====
function count(name){
let f=inv.find(x=>x.name===name);
return f?f.qty:0;
}

function calc(item, qty, res={}){
if(!recipes[item]){
res[item]=(res[item]||0)+qty;
return res;
}
for(let m in recipes[item]){
calc(m, recipes[item][m]*qty, res);
}
return res;
}

function plan(){
let item=craftSelect.value;
let qty=parseInt(craftQty.value);
if(!item||!qty) return;

let need=calc(item,qty);
let out="<ul>";

for(let m in need){
let have=count(m);
let miss=Math.max(0, need[m]-have);
out+=`<li>${m}: need ${need[m]} | have ${have} | missing ${miss}</li>`;
}

out+="</ul>";
craftOut.innerHTML=out;
}

// ===== TRADE =====
function trade(){
let b=parseFloat(buy.value);
let s=parseFloat(sell.value);
let a=parseFloat(amount.value);

if(!b||!s||!a) return;

let profit=(s-b)*a;
tradeOut.innerHTML=`Profit: ${profit}`;
}

// ===== BACKUP =====
function exportData(){
const blob=new Blob([JSON.stringify(inv)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download="nms_save.json";
a.click();
}

function importData(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=()=>{
inv=JSON.parse(reader.result);
save(); render();
};
reader.readAsText(file);
}

// ===== INIT =====
function init(){
for(let k in recipes){
let o=document.createElement("option");
o.value=k;
o.textContent=k;
craftSelect.appendChild(o);
}
render();
}

init();

</script>

</body>
</html>
